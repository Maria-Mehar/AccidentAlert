# 6GB RAM ke liye Optimized Settings
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError

# Kotlin Daemon ko crash se bachanay ke liye memory limit
kotlin.daemon.jvmargs=-Xmx512m

# Isay true karne se har baar 19 minute nahi lagenge, sirf change code build hoga
kotlin.incremental=true
kotlin.incremental.js=false
kotlin.incremental.multiplatform=false

android.useAndroidX=true
android.enableJetifier=true